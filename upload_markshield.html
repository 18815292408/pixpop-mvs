<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Upload - MarkShield</title>
<style>
body{font-family:-apple-system,'Inter',sans-serif;background:#0a0a0b;color:#f5f5f7;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0;padding:20px;}
.card{background:#1c1c1e;border-radius:16px;padding:40px;max-width:480px;width:100%;border:1px solid #2c2c2e;}
h1{font-size:1.5rem;margin-bottom:8px;}
p{color:#8e8e93;margin-bottom:24px;font-size:0.9rem;line-height:1.5;}
label{display:block;margin-bottom:6px;font-weight:500;font-size:0.9rem;color:#f5f5f7;}
input,textarea{width:100%;padding:12px;background:#2c2c2e;border:1px solid #3a3a3c;border-radius:8px;color:#f5f5f7;margin-bottom:16px;box-sizing:border-box;font-family:inherit;}
button{width:100%;padding:14px;background:#ff9f0a;color:#000;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;}
button:hover{background:#ffb340;}
.note{font-size:0.8rem;color:#636366;text-align:center;margin-top:16px;}
a{color:#ff9f0a;}
</style>
</head>
<body>
<div class="card">
    <h1>🛡️ MarkShield - Free Watermark</h1>
    <p>Upload your product photo. We'll add an invisible watermark and email it back — free.</p>
    <form action="https://formsubmit.co/5c9480f6434417a3482a7c37da27f389" method="POST" enctype="multipart/form-data">
        <input type="hidden" name="_subject" value="MarkShield - New Photo Submission">
        <input type="hidden" name="_captcha" value="true">
        <input type="hidden" name="_next" value="https://18815292408.github.io/pixpop-mvs/markshield">
        <label>Your name</label>
        <input type="text" name="name" required placeholder="e.g. Sarah">
        <label>Your email (where we'll send the protected photo)</label>
        <input type="email" name="email" required placeholder="you@example.com">
        <label>What type of product do you sell?</label>
        <input type="text" name="product" placeholder="e.g. handmade jewelry, digital art">
        <label>Attach your photo</label>
        <input type="file" name="attachment" accept="image/*" required>
        <button type="submit">Submit for Free Protection →</button>
    </form>
    <p class="note">One free protection per person. We'll process and email you within 24 hours.</p>
    <p style="text-align:center;margin-top:16px;"><a href="/markshield">← Back</a></p>
</div>
</body>
</html>
