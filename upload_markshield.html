<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Upload - MarkShield</title>
<style>
body { font-family: -apple-system, 'Inter', sans-serif; background: #0a0a0b; color: #f5f5f7; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
.card { background: #1c1c1e; border-radius: 16px; padding: 40px; max-width: 480px; width: 100%; border: 1px solid #2c2c2e; }
h1 { font-size: 1.5rem; margin-bottom: 8px; }
p { color: #8e8e93; margin-bottom: 24px; font-size: 0.9rem; }
label { display: block; margin-bottom: 6px; font-weight: 500; font-size: 0.9rem; }
input, input[type=file] { width: 100%; padding: 12px; background: #2c2c2e; border: 1px solid #3a3a3c; border-radius: 8px; color: #f5f5f7; margin-bottom: 16px; box-sizing: border-box; }
button { width: 100%; padding: 14px; background: #ff9f0a; color: #000; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
button:hover { background: #ffb340; }
.note { font-size: 0.8rem; color: #636366; margin-top: 16px; text-align: center; }
</style>
</head>
<body>
<div class="card">
    <h1>🛡️ MarkShield - Free Watermark</h1>
    <p>Upload ONE product photo and we'll embed an invisible watermark for free.</p>
    <form action="/upload" method="post" enctype="multipart/form-data">
        <input type="hidden" name="type" value="markshield">
        <label>Your email (where we'll send the watermarked photo + verification)</label>
        <input type="email" name="email" required placeholder="you@example.com">
        <label>Your product photo</label>
        <input type="file" name="file" accept="image/*" required>
        <button type="submit">Protect for Free →</button>
    </form>
    <div class="note">One free protection per person. We'll embed watermark and email you the result within 24 hours.</div>
</div>
</body>
</html>
