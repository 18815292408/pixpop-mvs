<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Thanks - Order Received</title>
    <style>

            color: #f5f5f7;

        .highlight { color: #30d158; }
        .back-link {
            display: inline-block; margin-top: 24px;
            color: #30d158; text-decoration: none; font-size: 0.9rem;
        }

</head>

    <div class="card">
        <div class="emoji-big">🎉</div>

        <p style="margin-top: 20px; font-size: 0.85rem;">Questions? Reply to the confirmation email and we'll get back to you.</p>
